replicaCount: 1

image:
  repository: clock
  tag: ci
  pullPolicy: Never  # loaded directly into kind, no registry pull

service:
  type: NodePort
  port: 80
  nodePort: 30080 # must match kind config extraPortMappings for 80 -> 30080

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
